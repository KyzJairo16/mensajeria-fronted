<div class="registro-container animate__animated animate__fadeInUp">
  <div class="registro-card">
    <h2>Crear Cuenta</h2>
    <p class="subtitle">Únete a la red de mensajería más grande de Colombia</p>

    <form class="registro-form">
      <div class="form-group">
        <label>Tipo de Cliente</label>
        <select class="form-input">
          <option value="natural">Persona Natural</option>
          <option value="empresa">Empresa / Corporativo</option>
          <option value="aliado">Aliado Logístico</option>
        </select>
      </div>

      <div class="form-group">
        <label>Nombre Completo / Razón Social</label>
        <input type="text" class="form-input" placeholder="Ej: Juan Pérez o Transportes S.A.">
      </div>

      <div class="form-group">
        <label>Correo Electrónico</label>
        <input type="email" class="form-input" placeholder="correo@ejemplo.com">
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" class="form-input" placeholder="********">
      </div>

      <button type="submit" class="btn-registrar-full">Finalizar Registro</button>
    </form>
  </div>
</div>
