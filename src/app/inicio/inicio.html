<div class="hero-block">
  <div style="text-align: right; margin-bottom: 20px;">
    <button (click)="alternarModo()" class="btn-tema">
      <i [class]="modoOscuro ? 'fa-solid fa-sun' : 'fa-solid fa-moon'"></i>
      <span style="margin-left: 8px;">{{ modoOscuro ? 'Modo Claro' : 'Modo Oscuro' }}</span>
    </button>
  </div>

  <div class="hero-text-side animate__animated animate__fadeInLeft">
    <h1 class="main-title">Comunica.<br>Envia.<br>Conecta.</h1>
    <p class="main-description">
      4-72 ofrece la red de mensajería más grande de Colombia...
    </p>
    <button class="hero-cta" routerLink="/registro">Empezar envío</button>
  </div>

  <div class="hero-image-side animate__animated animate__fadeInRight">
    <img src="imagen_central.jpg" class="hero-img" alt="Logística 4-72">
  </div>

  <div class="clear-fix"></div>
</div>

<app-footer></app-footer>
