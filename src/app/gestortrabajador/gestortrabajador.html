
<div class="admin-wrapper">

  <!-- HEADER -->
  <div class="header">
    <h2>
      <i class="fas fa-user-tie"></i>
      Gestión de Trabajadores
    </h2>

    <select class="filtro">
      <option>Todos</option>
      <option>Conductores</option>
      <option>Manipuladores</option>
      <option>Administrativos</option>
    </select>
  </div>

  <!-- LEYENDA -->
  <div class="legend">

    <div class="legend-item conductor">
      <i class="fas fa-truck"></i> Conductores
    </div>

    <div class="legend-item manipulador">
      <i class="fas fa-box"></i> Manipuladores
    </div>

    <div class="legend-item admin">
      <i class="fas fa-user-shield"></i> Administrativos
    </div>

  </div>

  <!-- CONTADOR -->
  <div class="contador">
    <i class="fas fa-users "></i>
    <span> Total trabajadores: </span>
    <strong>3</strong>
  </div>

  <div class="workers-container">

    <!-- CONDUCTOR -->
    <div class="worker-card conductor">

      <div class="worker-top">

        <div class="avatar conductor">JD</div>

        <div class="worker-info">

          <div class="name-row">
            <h3>
              <i class="fas fa-user"></i>
              Jorge Díaz
            </h3>

          </div>

          <div class="details">
            <span><i class="fas fa-id-card"></i> CC 1.234.567</span>
            <span><i class="fas fa-phone"></i> 310 111 2222</span>
            <span><i class="fas fa-id-badge"></i> Licencia C2</span>
          </div>

          <div class="turno">
            <i class="fas fa-clock"></i> Turno: Mañana
          </div>

        </div>

        <div class="actions">
          <button type="button" class="btn btn-primary" ><i class="fas fa-sync-alt"></i> Actualizar</button>
          <button type="button" class="btn btn-danger" ><i class="fa-solid fa-trash"></i> Eliminar </button>
        </div>

      </div>

    </div>


    <div class="worker-card manipulador">

      <div class="worker-top">

        <div class="avatar manipulador">LM</div>

        <div class="worker-info">

          <div class="name-row">
            <h3>
              <i class="fas fa-user"></i>
              Laura Muñoz
            </h3>

          </div>

          <div class="details">
            <span><i class="fas fa-id-card"></i> CC 9.876.543</span>
            <span><i class="fas fa-phone"></i> 300 222 3333</span>
            <span><i class="fas fa-warehouse"></i> Bodega 2</span>
          </div>

          <div class="turno">
            <i class="fas fa-clock"></i> Turno: Tarde
          </div>

        </div>

        <div class="actions">
          <button type="button" class="btn btn-primary" ><i class="fas fa-sync-alt"></i> Actualizar</button>
          <button type="button" class="btn btn-danger" ><i class="fa-solid fa-trash"></i> Eliminar </button>
        </div>

      </div>

    </div>

    <!--  ADMIN -->
    <div class="worker-card admin">

      <div class="worker-top">

        <div class="avatar admin">MR</div>

        <div class="worker-info">

          <div class="name-row">
            <h3>
              <i class="fas fa-user"></i>
              María Rodríguez
            </h3>

          </div>

          <div class="details">
            <span><i class="fas fa-id-card"></i> CC 8.112.334</span>
            <span><i class="fas fa-envelope"></i> maria@empresa.com</span>
            <span><i class="fas fa-building"></i> Gestión</span>
          </div>

          <div class="turno">
            <i class="fas fa-clock"></i> Turno: Completo
          </div>

        </div>

        <div class="actions">
          <button type="button" class="btn btn-primary" ><i class="fas fa-sync-alt"></i> Actualizar</button>
          <button type="button" class="btn btn-danger" ><i class="fa-solid fa-trash"></i> Eliminar </button>
        </div>

      </div>

    </div>

  </div>

</div>
