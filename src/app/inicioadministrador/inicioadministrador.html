<div class="registro-container animate__animated animate__fadeInUp">
  <div class="registro-card">
    <div class="card-header">
      <h2>Iniciar Sesión</h2>
      <p class="subtitle">Accede como administrador de la empresa 4-72</p>
    </div>

    <form class="registro-form" (ngSubmit)="iniciarSesion()">
      <div class="form-group">
        <label>Usuario</label>
        <input type="text" class="form-input" name="usuario"
               [(ngModel)]="credenciales.usuario" placeholder="Usuario">
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" class="form-input" name="contrasenia"
               [(ngModel)]="credenciales.contrasenia" placeholder="Contraseña">
      </div>

      <!-- Mensaje de error -->
      <div *ngIf="mensajeError" class="error-message">
        ⚠️ {{ mensajeError }}
      </div>

      <div class="actions" style="display: flex; flex-direction: column; gap: 10px; margin-top: 20px;">
        <button type="submit" class="btn-registrar-full">Iniciar Sesión</button>
      </div>
    </form>
  </div>
</div>
